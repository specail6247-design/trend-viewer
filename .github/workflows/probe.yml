# 임시 실험용 — Actions 환경에서 인스타그램 접근 경로를 테스트합니다. (실험 후 삭제)
name: probe-reels

on:
  workflow_dispatch:

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python3 probe_reels.py
