# 1시간마다 트렌드 데이터를 수집해 GitHub Pages로 배포합니다.
name: build-and-deploy

on:
  schedule:
    - cron: "*/20 * * * *"   # 20분마다 — 언제 접속해도 20~30분 이내 데이터
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write   # 작업 끝에 다음 실행을 스스로 예약(이어달리기)하기 위해 필요

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 build_static.py
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
      # GitHub cron은 혼잡 시 1~2시간씩 밀리므로, 배포 후 17분 쉬었다가
      # 스스로 다음 실행을 예약해 20분 간격을 보장합니다. (cron은 끊김 대비 보험)
      - name: 다음 실행 예약
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          sleep 1020
          gh workflow run build-and-deploy -R ${{ github.repository }}
