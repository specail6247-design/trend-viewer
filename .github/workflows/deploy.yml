# 1시간마다 트렌드 데이터를 수집해 GitHub Pages로 배포합니다.
name: build-and-deploy

on:
  schedule:
    - cron: "*/20 * * * *"   # 20분마다 — 언제 접속해도 20~30분 이내 데이터
  workflow_dispatch:        # 수동 실행 버튼
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: 데이터 수집
        run: python3 build_static.py
      - uses: actions/configure-pages@v4
      - uses: actions/upload-pages-artifact@v3
        with:
          path: site
      - id: deployment
        uses: actions/deploy-pages@v4
